# --- DW3000 UWB Driver ---
CONFIG_DW3000=y
CONFIG_DW3000_CHIP_DW3000=y

# --- SPI & GPIO (required by DW3000 driver) ---
CONFIG_SPI=y
CONFIG_GPIO=y

# --- Logging ---
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y

# --- Anchor ID (override per board: west build -- -DCONFIG_ANCHOR_ID=1) ---
CONFIG_ANCHOR_ID=0
