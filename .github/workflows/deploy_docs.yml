name: Deploy Docs to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-docs
          targets: thumbv7em-none-eabihf

      - name: Build Rust docs
        working-directory: ./omnitiles
        run: cargo doc --no-deps --target-dir doc

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Python SDK docs
        working-directory: ./sdk
        run: |
          uv sync --extra docs
          uv run sphinx-build -b html docs docs/_build

      - name: Stage site
        run: |
          mkdir -p _site/rust _site/python
          cp -r omnitiles/doc/thumbv7em-none-eabihf/doc/. _site/rust/
          cp -r sdk/docs/_build/. _site/python/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
